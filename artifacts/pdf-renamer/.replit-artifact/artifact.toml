kind = "web"
previewPath = "/"
title = "PDF Renamer"
version = "1.0.0"
id = "artifacts/pdf-renamer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19481

[services.development]
run = "pnpm --filter @workspace/pdf-renamer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pdf-renamer", "run", "build" ]
publicDir = "artifacts/pdf-renamer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19481"
BASE_PATH = "/"
